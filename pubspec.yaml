name: minigames
description: "1 2 3 4 Player Mini Games - Play with friends on the same device!"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.28.0
  flame_audio: ^2.11.0
  flutter_riverpod: ^2.6.0
  go_router: ^14.8.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.5.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
